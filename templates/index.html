<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroVisionNet - Plant Disease Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-box:hover {
            background: #e8ebff;
            border-color: #764ba2;
        }

        .upload-box.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        #fileInput {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .preview-section {
            display: none;
            margin-top: 30px;
        }

        .preview-section.active {
            display: block;
        }

        .preview-image {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .result-section {
            display: none;
            margin-top: 30px;
            padding: 30px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .result-section.active {
            display: block;
        }

        .result-item {
            margin: 15px 0;
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .result-label {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 1.3em;
            color: #333;
        }

        .healthy {
            color: #28a745;
        }

        .diseased {
            color: #dc3545;
        }

        .confidence-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffe6e6;
            color: #dc3545;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .error-message.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 AgroVisionNet</h1>
            <p>AI-Powered Plant Disease Detection</p>
        </div>

        <div class="content">
            <div class="upload-section">
                <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">📷</div>
                    <h3>Click or Drag to Upload Plant Image</h3>
                    <p>Supports: JPG, JPEG, PNG</p>
                </div>
                <input type="file" id="fileInput" accept="image/*">
                <button class="btn" id="analyzeBtn" disabled>Analyze Plant</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 15px;">Analyzing image...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="preview-section" id="previewSection">
                <h3 style="text-align: center; margin-bottom: 20px;">Uploaded Image</h3>
                <img id="previewImage" class="preview-image">
            </div>

            <div class="result-section" id="resultSection">
                <h2 style="text-align: center; margin-bottom: 25px;">Detection Results</h2>
                
                <div class="result-item">
                    <div class="result-label">Plant Type</div>
                    <div class="result-value" id="plantType">-</div>
                </div>

                <div class="result-item">
                    <div class="result-label">Disease Status</div>
                    <div class="result-value" id="diseaseStatus">-</div>
                </div>

                <div class="result-item">
                    <div class="result-label">Confidence Level</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" id="confidenceFill">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        const fileInput = document.getElementById('fileInput');
        const uploadBox = document.getElementById('uploadBox');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const resultSection = document.getElementById('resultSection');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');

        // File input change
        fileInput.addEventListener('change', handleFileSelect);

        // Drag and drop
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect();
            }
        });

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (file) {
                selectedFile = file;
                
                // Show preview
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImage.src = e.target.result;
                    previewSection.classList.add('active');
                    resultSection.classList.remove('active');
                    errorMessage.classList.remove('active');
                };
                reader.readAsDataURL(file);
                
                analyzeBtn.disabled = false;
            }
        }

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // Hide previous results
            resultSection.classList.remove('active');
            errorMessage.classList.remove('active');
            loading.classList.add('active');
            analyzeBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                loading.classList.remove('active');

                if (response.ok) {
                    displayResults(data);
                } else {
                    showError(data.error || 'An error occurred during analysis');
                }
            } catch (error) {
                loading.classList.remove('active');
                showError('Failed to connect to the server. Please try again.');
            }

            analyzeBtn.disabled = false;
        });

        function displayResults(data) {
            document.getElementById('plantType').textContent = data.plant || 'Unknown';
            
            const diseaseStatus = document.getElementById('diseaseStatus');
            diseaseStatus.textContent = data.disease || 'Unknown';
            
            if (data.disease && data.disease.toLowerCase() === 'healthy') {
                diseaseStatus.className = 'result-value healthy';
            } else {
                diseaseStatus.className = 'result-value diseased';
            }

            const confidence = data.confidence || 0;
            const confidenceFill = document.getElementById('confidenceFill');
            confidenceFill.style.width = confidence + '%';
            confidenceFill.textContent = confidence + '%';

            resultSection.classList.add('active');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
        }
    </script>
</body>
</html>
