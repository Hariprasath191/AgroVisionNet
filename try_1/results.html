<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Results</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-green-50">

<nav class="flex justify-between px-8 py-4 bg-green-700 text-white">
  <h1 class="text-2xl font-bold">🌾 AgroVisionNet</h1>
  <a href="index.html">Home</a>
</nav>

<div class="max-w-xl mx-auto mt-16 bg-white p-8 rounded-xl shadow fade-in">

<h2 class="text-2xl font-bold text-green-700 mb-6">
Crop Health Report
</h2>

<p id="disease" class="mb-2 text-lg"></p>
<p id="confidence" class="mb-2 text-lg"></p>
<p id="risk" class="mb-2 text-lg"></p>
<p id="weather" class="mb-2 text-lg"></p>

</div>

<script src="js/app.js"></script>
<script src="js/chatbot.js"></script>
<!-- Floating Chat Button -->
<button onclick="toggleChat()"
class="fixed bottom-6 right-6 bg-green-600 text-white w-16 h-16 rounded-full shadow-lg text-2xl">
💬
</button>

<!-- Chatbox -->
<div id="chatbox"
class="hidden fixed bottom-24 right-6 bg-white w-72 h-96 shadow-xl rounded-xl p-4">

<div id="messages" class="h-64 overflow-y-auto mb-2"></div>

<input id="msg" class="border p-2 w-full mb-2">
<button onclick="sendMessage()"
class="bg-green-600 text-white px-4 py-2 rounded w-full">
Send
</button>
</div>
</body>
</html>
